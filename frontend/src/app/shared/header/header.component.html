<header class="header">
  <div class="container">
    <div class="header-content">
      <div class="logo">
        <a routerLink="/home">
          <mat-icon>home</mat-icon>
          <span>Maroc Immobilier</span>
        </a>
      </div>

      <nav class="nav-menu">
        <a routerLink="/home" routerLinkActive="active">Accueil</a>
        <a routerLink="/properties" routerLinkActive="active">Propriétés</a>
        <a routerLink="/search" routerLinkActive="active">Rechercher</a>
        <a *ngIf="isLoggedIn" routerLink="/favorites" routerLinkActive="active">Favoris</a>
        <a *ngIf="isLoggedIn" routerLink="/add-property" routerLinkActive="active">Publier</a>
      </nav>

      <div class="auth-buttons">
        <ng-container *ngIf="!isLoggedIn">
          <button mat-button routerLink="/login">Connexion</button>
          <button mat-raised-button color="primary" routerLink="/register">Inscription</button>
        </ng-container>
        <ng-container *ngIf="isLoggedIn">
          <button mat-button [matMenuTriggerFor]="userMenu">
            <mat-icon>account_circle</mat-icon>
            {{ user?.firstName }}
          </button>
          <mat-menu #userMenu="matMenu">
            <button mat-menu-item (click)="navigateToDashboard()">
              <mat-icon>dashboard</mat-icon>
              <span>Tableau de bord</span>
            </button>
            <button mat-menu-item routerLink="/favorites">
              <mat-icon>favorite</mat-icon>
              <span>Favoris</span>
            </button>
            <button mat-menu-item routerLink="/add-property">
              <mat-icon>add_circle</mat-icon>
              <span>Publier une annonce</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="logout()">
              <mat-icon>logout</mat-icon>
              <span>Déconnexion</span>
            </button>
          </mat-menu>
        </ng-container>
      </div>
    </div>
  </div>
</header>
