version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: morocco-realestate-db
    environment:
      POSTGRES_DB: morocco_real_estate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - morocco-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: morocco-realestate-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/morocco_real_estate
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-MoroccoRealEasteSecretKey2024ForJWTTokenGeneration}
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - morocco-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  morocco-network:
    driver: bridge
